name: Weekly Intelligence Digest

on:
  schedule:
    # Sunday 22:00 UTC = Monday 06:00 China Standard Time (UTC+8), so the
    # newsletter lands before the start of the work week.
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in test mode (1 report per source, quick checks)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly digest agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_REPORTS_TOKEN: ${{ secrets.GITHUB_REPORTS_TOKEN }}
          SOURCE_REPOS_JSON: ${{ secrets.SOURCE_REPOS_JSON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python weekly_digest_agent.py --test
          else
            python weekly_digest_agent.py
          fi

      - name: Upload generated newsletter as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_id }}
          path: reports/*.html
          retention-days: 90

      - name: Commit newsletter archive back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly intelligence digest for $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
